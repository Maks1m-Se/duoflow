<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuoFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 2rem;
      color: #4f46e5;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #4f46e5;
    }

    /* Pomodoro */
    .pomodoro-status {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 8px;
    }

    .progress-bar {
      background: #e5e7eb;
      border-radius: 99px;
      height: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #4f46e5;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .pomodoro-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .btn-start { background: #4f46e5; color: white; }
    .btn-stop  { background: #ef4444; color: white; }
    .btn-add   { background: #10b981; color: white; }

    /* Tasks */
    .task-input {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .task-input input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .task-list { list-style: none; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .task-item input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; }

    .task-item span {
      flex: 1;
      font-size: 0.9rem;
    }

    .task-item.done span {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .btn-delete {
      background: none;
      color: #9ca3af;
      font-size: 1rem;
      padding: 0 4px;
    }

    .btn-delete:hover { color: #ef4444; }
  </style>
</head>
<body>
  <h1>🌊 DuoFlow</h1>
  <div class="container">
    <div id="card-max" class="card"></div>
    <div id="card-gf" class="card"></div>
  </div>

  <script>
    const API = "http://127.0.0.1:8000";
    const USERS = { max: "Maksim", gf: "Freundin" };

    async function fetchTasks() {
      const res = await fetch(`${API}/tasks`);
      return res.json();
    }

    async function fetchPomodoro() {
      const res = await fetch(`${API}/pomodoro`);
      return res.json();
    }

    async function addTask(user, title) {
      await fetch(`${API}/tasks`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user, title })
      });
    }

    async function toggleTask(id) {
      await fetch(`${API}/tasks/${id}/done`, { method: "PATCH" });
    }

    async function deleteTask(id) {
      await fetch(`${API}/tasks/${id}`, { method: "DELETE" });
    }

    async function startPomodoro(user) {
      await fetch(`${API}/pomodoro/${user}/start`, { method: "POST" });
    }

    async function stopPomodoro(user) {
      await fetch(`${API}/pomodoro/${user}/stop`, { method: "POST" });
    }

    function renderCard(user, label, tasks, pomodoro) {
      const p = pomodoro[user];
      const userTasks = tasks.filter(t => t.user === user);
      const done = userTasks.filter(t => t.done).length;
      const total = userTasks.length;

      document.getElementById(`card-${user}`).innerHTML = `
        <h2>${label} ${total > 0 ? `(${done}/${total})` : ""}</h2>

        <div class="pomodoro-status">
          🍅 Pomodoro: <strong>${p.status === "running" ? `läuft — ${p.progress}%` : "pausiert"}</strong>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${p.progress}%"></div>
        </div>
        <div class="pomodoro-buttons">
          <button class="btn-start" onclick="startPomodoro('${user}').then(refresh)">▶ Start</button>
          <button class="btn-stop" onclick="stopPomodoro('${user}').then(refresh)">⏹ Stop</button>
        </div>

        <div class="task-input">
          <input type="text" id="input-${user}" placeholder="Neue Aufgabe..." 
            onkeydown="if(event.key==='Enter') addTaskAndRefresh('${user}')">
          <button class="btn-add" onclick="addTaskAndRefresh('${user}')">+</button>
        </div>

        <ul class="task-list">
          ${userTasks.map(t => `
            <li class="task-item ${t.done ? 'done' : ''}">
              <input type="checkbox" ${t.done ? 'checked' : ''} 
                onchange="toggleTask(${t.id}).then(refresh)">
              <span>${t.title}</span>
              <button class="btn-delete" onclick="deleteTask(${t.id}).then(refresh)">✕</button>
            </li>
          `).join("")}
        </ul>
      `;
    }

    async function addTaskAndRefresh(user) {
      const input = document.getElementById(`input-${user}`);
      const title = input.value.trim();
      if (!title) return;
      await addTask(user, title);
      input.value = "";
      refresh();
    }

    async function refresh() {
      const [tasks, pomodoro] = await Promise.all([fetchTasks(), fetchPomodoro()]);
      renderCard("max", USERS.max, tasks, pomodoro);
      renderCard("gf", USERS.gf, tasks, pomodoro);
    }

    // Erste Laden + alle 4 Sekunden aktualisieren
    refresh();
    setInterval(refresh, 4000);
  </script>
</body>
</html>
